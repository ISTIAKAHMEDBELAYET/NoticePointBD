<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 130" role="img" aria-label="NoticePointBD animated logo">
  <defs>
    <linearGradient id="npbGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1d4ed8" />
      <stop offset="100%" stop-color="#0ea5e9" />
    </linearGradient>
  </defs>

  <style>
    .pulse-ring {
      transform-origin: 62px 65px;
      animation: ringPulse 2.3s ease-in-out infinite;
    }
    .pulse-dot {
      transform-origin: 62px 65px;
      animation: dotBeat 1.15s ease-in-out infinite;
    }
    .shine {
      animation: shineMove 3.5s linear infinite;
    }
    .brand-name {
      font-family: 'Noto Sans Bengali', 'Segoe UI', 'Trebuchet MS', sans-serif;
      font-weight: 800;
      letter-spacing: 0.1px;
    }
    .brand-sub {
      font-family: 'Noto Sans Bengali', sans-serif;
      font-weight: 500;
      letter-spacing: 0.1px;
    }
    @keyframes ringPulse {
      0%, 100% { transform: scale(1); opacity: 0.95; }
      50% { transform: scale(1.08); opacity: 0.6; }
    }
    @keyframes dotBeat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.16); }
    }
    @keyframes shineMove {
      0% { transform: translateX(-100px); opacity: 0; }
      15% { opacity: 0.7; }
      65% { opacity: 0.7; }
      100% { transform: translateX(350px); opacity: 0; }
    }
  </style>

  <g>
    <circle class="pulse-ring" cx="62" cy="65" r="32" fill="none" stroke="url(#npbGrad)" stroke-width="8" />
    <circle class="pulse-dot" cx="62" cy="65" r="11" fill="url(#npbGrad)" />
  </g>

  <path d="M96 37h4v56h-4z" fill="#e5e7eb" />
  <text x="114" y="68" class="brand-name" font-size="35" fill="#1e3a8a">
    NoticePointBD
  </text>
  <text x="114" y="93" class="brand-sub" font-size="16" fill="#4b5563">
    চাকরি, ভর্তি, ফলাফল ও নোটিশ
  </text>
  <rect class="shine" x="0" y="23" width="64" height="4" rx="2" fill="#93c5fd" />
</svg>
